<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AvatarForms</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.css" rel="stylesheet"/>
    <link href="css/styles.css" rel="stylesheet"/>
  </head>

<body>
  <nav id="navbar-container" class="fixed top-0 w-full z-50"></nav>

  <!--Layout Container-->
  <div class="flex pt-16 ml-64">
    <aside id="sidebar-container" class="fixed left-0 top-16 w-64 min-h-screen"></aside>
    
    <!-- Main content area -->
    <main class="flex-1 p-6">
      <div id="breadcrumbs-container" class="mb-6"></div>
      <!-- Your page content goes here -->
    </main>
  </div>


  <!-- FlowBite JS-->
  <script src="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.js"></script>
  <script>
    const breadcrumbPaths = {
      'index.html': [{ title: 'Home', href: 'index.html' }],
      'requirements.html': [
        { title: 'Home', href: 'index.html' },
        { title: 'Requirements', href: 'requirements.html' }
      ],
      'appendices.html': [
        { title: 'Home', href: 'index.html' },
        { title: 'Requirements', href: 'requirements.html' },
        { title: 'Appendices', href: 'appendices.html' }
      ]
    };

    function addCurrentBreadcrumb() {
      const breadcrumbsList = document.getElementById('breadcrumbs-list');
      if (!breadcrumbsList) return;

      const currentPath = window.location.pathname.split('/').pop() || 'index.html';
      const trail = breadcrumbPaths[currentPath] || [
        { title: 'Home', href: 'index.html' },
        { title: 'Page' }
      ];

      if (currentPath === 'index.html') return;

      trail.slice(1).forEach((crumb, index) => {
        const isLast = index === trail.slice(1).length - 1;
        const listItem = document.createElement('li');
        listItem.className = 'inline-flex items-center gap-2 text-body';

        const separator = `
          <svg class="w-3 h-3 text-body" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 6 10">
            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 9 4-4-4-4"/>
          </svg>
        `;

        if (isLast || !crumb.href) {
          listItem.innerHTML = `${separator}<span aria-current="page">${crumb.title}</span>`;
        } else {
          listItem.innerHTML = `${separator}<a href="${crumb.href}" class="hover:text-fg-brand">${crumb.title}</a>`;
        }

        breadcrumbsList.appendChild(listItem);
      });
    }

    fetch('components/navbar.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('navbar-container').innerHTML = data;
      })
      .catch(error => console.error('Error loading navbar:', error));
    
    fetch('components/sidebar.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('sidebar-container').innerHTML = data;
      })
      .catch(error => console.error('Error loading sidebar:', error));

    fetch('components/breadcrumbs.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('breadcrumbs-container').innerHTML = data;
        addCurrentBreadcrumb();
      })
      .catch(error => console.error('Error loading breadcrumbs:', error));
  </script>
</body>

</html>
